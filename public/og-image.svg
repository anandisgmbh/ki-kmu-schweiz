<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <pattern id="dots" x="0" y="0" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.2" fill="#0B0F1A" opacity="0.08"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#ffffff"/>
  <rect width="1200" height="630" fill="url(#dots)"/>

  <!-- Top-right logo mark -->
  <g transform="translate(1040, 48)">
    <rect x="0" y="0" width="112" height="112" rx="22" fill="#0B0F1A"/>
    <rect x="48" y="22" width="16" height="68" fill="#ffffff"/>
    <rect x="22" y="48" width="68" height="16" fill="#C9FF00"/>
  </g>

  <!-- Tag line top-left -->
  <text x="80" y="92" font-family="Inter, -apple-system, sans-serif" font-weight="900" font-size="18" fill="#7FAE00" letter-spacing="2.5">
    KI FÜR SCHWEIZER KMU
  </text>

  <!-- Lime highlight bar behind "wirklich läuft" -->
  <rect x="68" y="302" width="640" height="32" fill="#C9FF00"/>

  <!-- Headline lines -->
  <text x="80" y="236" font-family="Inter, -apple-system, sans-serif" font-weight="800" font-size="84" fill="#0B0F1A" letter-spacing="-2">
    KI, die in 8 Wochen
  </text>
  <text x="80" y="332" font-family="Inter, -apple-system, sans-serif" font-weight="800" font-size="84" fill="#0B0F1A" letter-spacing="-2">
    wirklich läuft.
  </text>
  <text x="80" y="428" font-family="Inter, -apple-system, sans-serif" font-weight="800" font-size="84" fill="#0B0F1A" letter-spacing="-2">
    Nicht in PowerPoint.
  </text>

  <!-- Bottom brand bar -->
  <rect x="0" y="540" width="1200" height="90" fill="#0B0F1A"/>
  <text x="80" y="596" font-family="Inter, -apple-system, sans-serif" font-weight="800" font-size="30" fill="#ffffff" letter-spacing="-0.5">
    KI-KMU-Schweiz.ch
  </text>
  <text x="450" y="596" font-family="Inter, -apple-system, sans-serif" font-weight="700" font-size="20" fill="#C9FF00" letter-spacing="0.5">
    ETH-Ingenieur · 10+ Projekte · Fixpreise · 🇨🇭 Swiss hosted
  </text>
</svg>
